status = "implemented"
oxirs_module = "event_model"
esmf_reference = "https://eclipse-esmf.github.io/samm-specification/2.1.0/index.html#event"
notes = "Event element with parameter list; lifecycle hooks are partial."

[[aspect_modeling]]
name = "Characteristic definition (Trait)"
status = "implemented"
oxirs_module = "metamodel::characteristic"
esmf_reference = "https://eclipse-esmf.github.io/samm-specification/2.1.0/index.html#characteristics"
notes = "Characteristic trait hierarchy including Measurement, Enumeration, Collection, etc."

[[aspect_modeling]]
name = "Entity (complex structured type)"
status = "implemented"
oxirs_module = "metamodel::entity"
esmf_reference = "https://eclipse-esmf.github.io/samm-specification/2.1.0/index.html#entity"
notes = "Entity with extends-hierarchy and nested property lists."

[[aspect_modeling]]
name = "Abstract entity / entity inheritance"
status = "partial"
esmf_reference = "https://eclipse-esmf.github.io/samm-specification/2.1.0/index.html#abstract-entity"
