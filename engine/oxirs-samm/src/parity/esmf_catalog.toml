##############################################################################
# ESMF SDK 2.x Feature Parity Catalog for oxirs-samm
#
# Each entry covers one documented ESMF SDK 2.x feature.
# Fields:
#   name           - human-readable feature name
#   status         - "implemented" | "partial" | "missing"
#   oxirs_module   - Rust module in this crate (omit if status != "implemented")
#   esmf_reference - canonical URL into ESMF / SAMM 2.x specification
#   notes          - one-sentence clarification / scope note
##############################################################################

# ──────────────────────────────────────────────────────────────────────────
# Aspect Modeling
# ──────────────────────────────────────────────────────────────────────────

[[aspect_modeling]]
name = "Aspect definition"
status = "implemented"
oxirs_module = "metamodel::aspect"
esmf_reference = "https://eclipse-esmf.github.io/samm-specification/2.1.0/index.html#aspect"
notes = "Core Aspect element with properties, operations and events fully modelled."

[[aspect_modeling]]
name = "Property (mandatory and optional)"
status = "implemented"
oxirs_module = "metamodel::property"
esmf_reference = "https://eclipse-esmf.github.io/samm-specification/2.1.0/index.html#property"
notes = "Property with optional flag, characteristic binding and example values."

[[aspect_modeling]]
name = "Operation"
status = "implemented"
oxirs_module = "metamodel::operation"
esmf_reference = "https://eclipse-esmf.github.io/samm-specification/2.1.0/index.html#operation"
notes = "Operation with typed input and output parameters."

[[aspect_modeling]]
