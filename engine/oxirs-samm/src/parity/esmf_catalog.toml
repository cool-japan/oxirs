[[aspect_modeling]]
name = "Constraint types (Range, Length, RegularExpression, Encoding, FixedPoint)"
status = "partial"
oxirs_module = "constraint_validator"
esmf_reference = "https://eclipse-esmf.github.io/samm-specification/2.1.0/index.html#constraints"
notes = "Range, Length, and RegularExpression constraints implemented; FixedPoint and Encoding constraints are partial."

[[aspect_modeling]]
name = "Either characteristic"
status = "implemented"
oxirs_module = "metamodel::characteristic"
esmf_reference = "https://eclipse-esmf.github.io/samm-specification/2.1.0/index.html#either-characteristic"
notes = "samm-c:Either discriminated union variant in CharacteristicKind with parser (samm-c:left/right), Turtle serializer, JSON Schema oneOf, OpenAPI oneOf, DTDL fallback, and schema validation."

