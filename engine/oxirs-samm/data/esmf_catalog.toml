##############################################################################
# ESMF SDK 2.x Feature Parity Catalog for oxirs-samm
#
# This is the hand-curated reference copy. The embedded version used at
# compile time lives at src/parity/esmf_catalog.toml and is kept in sync.
#
# Each entry covers one documented ESMF SDK 2.x feature.
# Fields:
#   name           - human-readable feature name (unique per category)
#   description    - one-sentence scope note
#   status         - "done" | "partial" | "missing"
#   oxirs_module   - Rust module in this crate (omit if status == "missing")
#   notes          - additional caveats or ESMF reference URL
##############################################################################

# ──────────────────────────────────────────────────────────────────────────
# Aspect Modeling
# ──────────────────────────────────────────────────────────────────────────

