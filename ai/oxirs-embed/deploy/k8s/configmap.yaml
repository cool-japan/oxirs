apiVersion: v1
kind: ConfigMap
metadata:
  name: oxirs-embed
  namespace: oxirs
  labels:
    app.kubernetes.io/name: oxirs-embed
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: oxirs
data:
  bindAddress: "0.0.0.0:8080"
  metricsAddress: "0.0.0.0:9090"
  logLevel: "info"
  modelType: "TransE"
  modelDimensions: "128"
  # Distributed training defaults — flip distributed to "true" to enable the
  # parameter-server-style training loop.
  distributed: "false"
  numShards: "4"
  numWorkers: "4"
  updateMode: "async"
  shardingStrategy: "entity-hash"
