apiVersion: v1
kind: Service
metadata:
  name: {{ include "oxirs-embed.fullname" . }}
  labels:
    {{- include "oxirs-embed.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "oxirs-embed.selectorLabels" . | nindent 4 }}
