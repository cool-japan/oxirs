apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oxirs-embed.fullname" . }}
  labels:
    {{- include "oxirs-embed.labels" . | nindent 4 }}
data:
  bindAddress: {{ .Values.config.bindAddress | quote }}
  metricsAddress: {{ .Values.config.metricsAddress | quote }}
  logLevel: {{ .Values.config.logLevel | quote }}
  modelType: {{ .Values.config.modelType | quote }}
  modelDimensions: {{ .Values.config.modelDimensions | quote }}
