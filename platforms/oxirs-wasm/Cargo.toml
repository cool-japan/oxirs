[package]
name = "oxirs-wasm"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "WebAssembly bindings for OxiRS - Run RDF/SPARQL in the browser"
keywords = ["wasm", "webassembly", "rdf", "sparql", "browser"]
categories = ["wasm", "web-programming", "database"]
readme = "README.md"
rust-version.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[lints]
workspace = true

[dependencies]
# Serialization
serde.workspace = true
serde_json.workspace = true

# Error handling
thiserror.workspace = true

# FILTER(regex(...)) support in the lightweight in-memory SPARQL executor
regex.workspace = true

# RFC 3986 §5.3 reference resolution for SPARQL BASE IRI handling
url.workspace = true

# WASM bindings
wasm-bindgen.workspace = true
js-sys.workspace = true
web-sys.workspace = true
console_error_panic_hook.workspace = true

[features]
default = []
sparql = []
reasoning = []
shacl = []
jsonld = []
# Opt-in, off by default: a deterministic, in-memory *mock* SPARQL endpoint
# client (`endpoint_client`) that fabricates responses from query text and
# performs no network I/O whatsoever. It exists for tests/demos that need a
# stand-in `EndpointClient` without a real HTTP round-trip. Gated behind this
# feature (rather than compiled in by default) so it can never be mistaken
# for, or accidentally wired up as, a real SPARQL protocol client.
mock-endpoint-client = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
