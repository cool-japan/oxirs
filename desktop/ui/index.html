<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OxiRS Desktop</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { display: flex; height: 100vh; overflow: hidden; }
  .sidebar {
    width: 200px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    padding: 16px 0;
  }
  .logo {
    padding: 0 16px 16px;
    font-size: 1.4em;
    font-weight: bold;
    color: #e94560;
    border-bottom: 1px solid #0f3460;
    margin-bottom: 12px;
  }
  .nav-links { list-style: none; }
  .nav-links li a {
    display: block;
    padding: 10px 16px;
    transition: background 0.15s;
    border-radius: 4px;
    margin: 2px 8px;
  }
  .nav-links li a:hover,
  .nav-links li a.active {
    background: #0f3460;
    color: #e94560;
  }
  .content { flex: 1; overflow: hidden; }
  #main-frame { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">OxiRS</div>
  <ul class="nav-links">
    <li><a href="#" class="active" onclick="loadPage('chat.html', this)">Chat</a></li>
    <li><a href="#" onclick="loadPage('query_builder.html', this)">Query Builder</a></li>
    <li><a href="#" onclick="loadPage('canbus.html', this)">CAN Bus</a></li>
  </ul>
</nav>
<main class="content">
  <iframe src="chat.html" id="main-frame"></iframe>
</main>
<script>
  function loadPage(page, link) {
    document.getElementById('main-frame').src = page;
    document.querySelectorAll('.nav-links a').forEach(function(a) {
      a.classList.remove('active');
    });
    link.classList.add('active');
  }
</script>
</body>
</html>
