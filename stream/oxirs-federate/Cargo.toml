[package]
name = "oxirs-federate"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "SERVICE planner and GraphQL stitching for federated SPARQL queries"
keywords = ["federation", "distributed-query", "sparql", "graphql", "rdf"]
categories = ["network-programming", "database", "algorithms"]
readme = "README.md"
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
oxirs-core = { workspace = true, features = ["serde"] }
oxirs-vec.workspace = true
oxirs-arq.workspace = true

# SciRS2 dependencies for federated processing
scirs2-core = { workspace = true, features = ["profiling"] }
tokio.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
reqwest = { workspace = true, features = ["stream", "gzip"] }
async-trait.workspace = true
futures.workspace = true
dashmap.workspace = true
parking_lot.workspace = true
chrono = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["v4", "serde"] }
url.workspace = true
backoff = { version = "0.4", features = ["tokio"] }
governor.workspace = true
bytes = { workspace = true }
base64.workspace = true
jsonwebtoken.workspace = true
# oxigraph = "0.4.11"  # REMOVED: Using oxirs-core instead
mdns-sd = { version = "0.20", optional = true }
kube = { workspace = true, optional = true }
k8s-openapi = { workspace = true, optional = true }
redis = { workspace = true, features = ["aio", "tokio-comp"], optional = true }
lru = { workspace = true, optional = true }
moka = { workspace = true, optional = true }
bloom = { version = "0.3", optional = true }
petgraph.workspace = true
regex.workspace = true
md5.workspace = true
oxiarc-deflate.workspace = true
oxiarc-brotli.workspace = true
oxiarc-lz4.workspace = true
oxiarc-zstd.workspace = true
rmp-serde.workspace = true
ciborium.workspace = true
tokio-stream = { workspace = true, features = ["sync"] }
futures-util.workspace = true
sysinfo.workspace = true
# rand, rand_distr, and ndarray provided by scirs2-core

[dev-dependencies]
criterion.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
k8s-openapi.workspace = true
wiremock.workspace = true

[features]
default = ["caching", "redis-cache"]
kubernetes = ["kube", "k8s-openapi"]
redis-cache = ["redis"]
caching = ["lru", "moka", "bloom"]
service-discovery = ["mdns-sd"]
# GPU acceleration via scirs2-core's Pure-Rust `gpu` feature (no GPU FFI).
# Gates `gpu_accelerated_query.rs`, which imports `scirs2_core::gpu`.
gpu = ["scirs2-core/gpu"]


[[bench]]
name = "federation_bench"
harness = false
