[package]
name = "oxirs-stream"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Real-time streaming support with Kafka/NATS/MQTT/OPC-UA I/O, RDF Patch, and SPARQL Update delta"
keywords = ["streaming", "kafka", "mqtt", "opcua", "industry40"]
categories = ["network-programming", "asynchronous", "database"]
readme = "README.md"
rust-version.workspace = true

[dependencies]
oxirs-core.workspace = true

# SciRS2 dependencies for streaming analysis
scirs2-signal = { workspace = true }
scirs2-stats = { workspace = true }
scirs2-core = { workspace = true }
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
rdkafka = { workspace = true, optional = true }
async-nats = { workspace = true, optional = true }
chrono.workspace = true
uuid.workspace = true
regex.workspace = true
futures-util.workspace = true
futures.workspace = true
async-trait.workspace = true
parking_lot.workspace = true
bytes = { workspace = true }
fastrand.workspace = true
bumpalo.workspace = true
quick-xml.workspace = true
rayon.workspace = true
aws-config = { version = "1.8", optional = true }
aws-sdk-kinesis = { version = "1.103", optional = true }
aws-smithy-types = { version = "1.4", optional = true }
redis = { workspace = true, features = ["tokio-comp", "connection-manager", "cluster-async", "streams"], optional = true }
pulsar = { version = "6.7", optional = true }
lapin = { version = "4.3", optional = true, features = ["native-tls"] }
rumqttc = { version = "0.25", optional = true, features = ["use-rustls"] }
async-opcua = { version = "0.18", optional = true, features = ["client"] }
time = { version = "0.3.47", optional = true }  # CVE-2026-25727 fix
toml.workspace = true
base64.workspace = true
rmp-serde.workspace = true
ciborium.workspace = true
oxicode.workspace = true  # Replaces bincode per COOLJAPAN Policy
flate2.workspace = true
oxiarc-zstd.workspace = true
reqwest = { workspace = true }
hmac.workspace = true
sha2.workspace = true
hex.workspace = true
# rand functionality now provided by scirs2-core (use scirs2_core::random)
prost = "0.14"
prost-types = "0.14"
apache-avro = "0.21"
tokio-stream.workspace = true
oxiarc-lz4.workspace = true
snap.workspace = true
brotli.workspace = true
crc32fast.workspace = true
dashmap.workspace = true
num_cpus.workspace = true
nalgebra.workspace = true
num-complex.workspace = true
# OpenTelemetry for enhanced observability (optional)
opentelemetry = { workspace = true, optional = true }
opentelemetry-jaeger = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }
opentelemetry-semantic-conventions = { workspace = true, optional = true }
sysinfo.workspace = true  # Updated to 0.33 to fix objc2-core-foundation conflict
wasmparser = "0.245"
wasmtime = { version = "43.0", optional = true }  # Multiple CVE fixes (CVE-2024-xxxx series)
ed25519-dalek.workspace = true
rsa = { workspace = true, optional = true }  # RUSTSEC-2023-0071 (Marvin Attack): only enable via the `wasm-rsa` feature; orphaned wasm_edge_processor.rs uses this for WASM module signature verification
once_cell.workspace = true
serde_yaml.workspace = true

[build-dependencies]
prost-build = { version = "0.14", optional = true }

[dev-dependencies]
criterion.workspace = true
tempfile.workspace = true
tracing-subscriber.workspace = true

[features]
default = ["memory"]
memory = []
kafka = ["rdkafka"]
nats = ["async-nats", "time"]
kinesis = ["aws-config", "aws-sdk-kinesis", "aws-smithy-types"]
redis = ["dep:redis"]
pulsar = ["dep:pulsar"]
rabbitmq = ["dep:lapin", "time"]
mqtt = ["dep:rumqttc"]
opcua = ["dep:async-opcua"]
sparkplug = ["mqtt", "dep:prost-build"]
industry40 = ["mqtt", "opcua", "sparkplug"]
compression = []
opentelemetry = ["dep:opentelemetry", "dep:opentelemetry-jaeger", "dep:opentelemetry_sdk", "dep:opentelemetry-semantic-conventions"]
all-backends = ["kafka", "nats", "kinesis", "redis", "pulsar", "rabbitmq", "mqtt", "opcua"]
wasm = ["dep:wasmtime"]
wasm-rsa = ["dep:rsa"]  # RUSTSEC-2023-0071: opt-in only; enables RSA WASM module signature verification (wasm_edge_processor.rs)

[package.metadata.docs.rs]
# Use memory backend only for docs.rs (avoids rdkafka, async-nats system deps)
features = ["memory", "compression"]
# Exclude: kafka (rdkafka), nats, kinesis, redis, pulsar, rabbitmq, wasm (wasmtime)
rustdoc-args = ["--cfg", "docsrs"]

[[bench]]
name = "performance_benchmarks"
harness = false

