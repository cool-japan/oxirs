[package]
name = "oxirs-modbus"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Modbus TCP/RTU/ASCII/TLS protocol support for OxiRS semantic web platform"
keywords = ["modbus", "industrial-iot", "plc", "rdf", "semantic-web"]
categories = ["network-programming", "embedded", "database"]
readme = "README.md"
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
oxirs-core.workspace = true
oxirs-stream.workspace = true
scirs2-core.workspace = true

tokio = { workspace = true, features = ["net", "io-util", "time", "sync", "rt-multi-thread"] }
tokio-serial = { version = "5.4", optional = true }
tokio-rustls = { version = "0.26.1", optional = true }
bytes = "1.11"

serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
toml.workspace = true

thiserror.workspace = true
anyhow.workspace = true
tracing.workspace = true

chrono = { workspace = true, features = ["serde"] }
futures = "0.3"
async-trait = "0.1"
deadpool = "0.12"
reqwest = { workspace = true, optional = true }

# TLS dependencies (feature-gated)
rustls = { version = "0.23.19", optional = true, default-features = false, features = ["std", "tls12", "ring"] }
rustls-pemfile = { version = "2.2.0", optional = true }
webpki-roots = { version = "1.0.6", optional = true }

[dev-dependencies]
tokio-test = "0.4"
criterion.workspace = true

[features]
default = ["tcp", "rtu"]
tcp = []
rtu = ["tokio-serial"]
tls = ["tokio-rustls", "rustls", "rustls-pemfile", "webpki-roots"]
samm-integration = []
testing = []
http-client = ["reqwest"]

[[bench]]
name = "modbus_performance"
harness = false
