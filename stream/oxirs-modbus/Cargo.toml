[package]
name = "oxirs-modbus"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Modbus TCP/RTU/ASCII/TLS protocol support for OxiRS semantic web platform"
keywords = ["modbus", "industrial-iot", "plc", "rdf", "semantic-web"]
categories = ["network-programming", "embedded", "database"]
readme = "README.md"
rust-version.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
oxirs-core.workspace = true
oxirs-stream.workspace = true
scirs2-core.workspace = true

tokio = { workspace = true, features = ["net", "io-util", "time", "sync", "rt-multi-thread"] }
tokio-util.workspace = true
tokio-serial = { workspace = true, optional = true }
tokio-rustls = { workspace = true, optional = true }
bytes.workspace = true

serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
toml.workspace = true

thiserror.workspace = true
anyhow.workspace = true
tracing.workspace = true

chrono = { workspace = true, features = ["serde"] }
futures.workspace = true
async-trait.workspace = true
deadpool.workspace = true
reqwest = { workspace = true, optional = true }

# TLS dependencies (feature-gated)
rustls = { workspace = true, optional = true }
rustls-pemfile = { workspace = true, optional = true }
webpki-roots = { workspace = true, optional = true }

# TUI dependencies (feature-gated, NOT in workspace)
ratatui = { version = "0.30.0", optional = true }
crossterm = { version = "0.29.0", optional = true }

[dev-dependencies]
tokio-test.workspace = true
criterion.workspace = true

[features]
default = ["tcp", "rtu"]
tcp = []
rtu = ["tokio-serial"]
tls = ["tokio-rustls", "rustls", "rustls-pemfile", "webpki-roots"]
samm-integration = []
testing = []
http-client = ["reqwest"]
tui = ["dep:ratatui", "dep:crossterm"]

[[example]]
name = "tui_browser_demo"
required-features = ["tui"]

[[bench]]
name = "modbus_performance"
harness = false
