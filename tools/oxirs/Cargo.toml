[package]
name = "oxirs"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Command-line interface for OxiRS - import, export, migration, and benchmarking tools"
keywords = ["cli", "sparql", "rdf", "command-line", "semantic-web"]
categories = ["command-line-utilities", "database", "development-tools"]
readme = "README.md"
rust-version.workspace = true

# End-user CLI application (not a library). Kept off crates.io so it can consume
# publish=false quarantine adapters (e.g. oxirs-tsdb-adapter-duckdb's libduckdb-sys)
# without putting C FFI on the published Pure-Rust surface. Ships as a release binary.
publish = false

[dependencies]
scirs2-core = { workspace = true }
# SCIRS2 POLICY: Full use of SciRS2 ecosystem for advanced analytics
scirs2-graph = { workspace = true }  # Graph algorithms (betweenness, closeness, etc.)
# scirs2-linalg, scirs2-optimize will be added when needed
oxirs-core.workspace = true
oxirs-arq.workspace = true
oxirs-ttl.workspace = true
oxirs-fuseki.workspace = true
oxirs-tdb.workspace = true
oxirs-rule.workspace = true
oxirs-samm.workspace = true
oxirs-shacl.workspace = true
# `oxirs modbus` wiring: TCP + the real in-process mock server only (no
# `rtu`), which keeps the Pure-Rust `tokio-serial` -> serialport C/udev
# dependency chain out of the default build entirely — RTU commands report
# an explicit "not yet supported" error instead of silently pulling that
# dependency in. `testing` gates oxirs_modbus::testing::MockModbusServer,
# the real backend for `oxirs modbus mock-server` (not a dev-only feature).
oxirs-modbus = { workspace = true, default-features = false, features = ["tcp", "testing"] }
# `oxirs canbus` wiring: DBC parsing / frame decode / SAMM generation only
# (no live SocketCAN interface access, which is Linux-only upstream).
oxirs-canbus.workspace = true
indexmap.workspace = true
clap.workspace = true
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
toml.workspace = true
anyhow.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
reqwest.workspace = true  # HTTP client for triplestore migrations
# Install the Pure Rust crypto provider (oxitls) as the rustls process default in main.
rustls.workspace = true
oxitls.workspace = true
# rand functionality now provided by scirs2-core (use scirs2_core::random)
uuid.workspace = true
sysinfo = { workspace = true }    # System information
tempfile.workspace = true    # Temporary file handling

# Enhanced CLI features
indicatif.workspace = true  # Progress bars
colored = "3.1"     # Colored output
prettytable-rs = "0.10"  # Table formatting
rustyline = "18.0"  # Interactive mode
rustyline-derive = "0.12"  # Helper derive macros
strsim = "0.11"     # String similarity for suggestions
regex.workspace = true
once_cell.workspace = true
url.workspace = true
dirs = "6.0"        # Platform-specific directories
clap_complete = "4.6"  # Shell completion support
textwrap = "0.16"   # Text wrapping for help
unicode-width = "0.2"  # Unicode text width
terminal_size = "0.4"  # Terminal dimensions
shlex = "2.0"       # Shell-like parsing
# OxiCrypto (Pure Rust) — replaces `ring` for AEAD, hashing, and KDF
oxicrypto-core.workspace = true   # Aead/Hash/StreamingHash traits + CryptoError
oxicrypto-aead.workspace = true   # AES-256-GCM (seal_to_vec / open_to_vec)
oxicrypto-hash.workspace = true   # SHA-256 one-shot + streaming
oxicrypto-kdf.workspace = true    # PBKDF2-HMAC-SHA256 key derivation
aes-gcm.workspace = true
argon2.workspace = true
chrono.workspace = true
dialoguer = "0.12"  # Interactive prompts
oxiarc-deflate.workspace = true  # DEFLATE/gzip compression (Pure Rust)
oxiarc-bzip2.workspace = true    # BZip2 compression (Pure Rust)
oxiarc-archive.workspace = true  # XZ container compression (Pure Rust; also ZIP/TAR/LZH support)
hostname = "0.4"    # System hostname for test reports
md5.workspace = true
hex.workspace = true         # Hex encoding for checksums
rust_xlsxwriter = { workspace = true, optional = true }  # Excel XLSX file generation (feature-gated for Pure Rust policy)
keyring-core = { workspace = true, optional = true }  # System keyring integration (platform-specific, feature-gated)
apple-native-keyring-store = { workspace = true, optional = true }  # macOS Keychain backend for keyring
inferno = "0.12"    # Flame graph generation for profiling
printpdf = { version = "0.11", optional = true }    # PDF generation for reports (feature-gated; requires pdf-export feature)
handlebars.workspace = true  # Template engine for custom output formats
oxilangtag.workspace = true  # BCP-47 language tag validation and normalization
quick-xml.workspace = true   # XML parsing for SPARQL Results XML (SRX) format

[dev-dependencies]
criterion.workspace = true
wiremock.workspace = true
# `serve --graphql` regression test: drive the fuseki production router
# in-process via `tower::ServiceExt::oneshot` (no socket bind).
axum.workspace = true
tower = { workspace = true, features = ["util"] }

[features]
default = []
# The full recommended CLI feature set: every optional feature *except*
# `tsdb-duckdb`. Renamed from the old `all-features` (which only enabled
# text/geo/pdf-export and silently omitted excel-export/system-keyring/
# tsdb-duckdb) because `all-features` reads as parity with `cargo build
# --all-features`, which it never was. `tsdb-duckdb` is deliberately excluded
# even here — unlike every other feature listed, it pulls libduckdb C FFI via
# the `oxirs-tsdb-adapter-duckdb` quarantine crate, so an operator must opt
# into it explicitly (`--features tsdb-duckdb`) per the COOLJAPAN Pure Rust
# default policy. `text` also leaves the default Pure-Rust build (it pulls
# Tantivy, which pulls C `zstd-sys`) but is kept in this bundle since it
# predates this fix and was already part of the old `all-features` list.
full-cli = [
    "text",
    "geo",
    "pdf-export",
    "excel-export",
    "system-keyring"
]
excel-export = ["rust_xlsxwriter"]
pdf-export = ["dep:printpdf"]
system-keyring = ["dep:keyring-core", "dep:apple-native-keyring-store"]  # Enable OS-level secret storage (macOS Keychain, Windows Credential Manager, Linux Secret Service)
# Propagate the non-default `full-text-search` gate to oxirs-tdb and oxirs-fuseki.
# Enables Tantivy-backed full-text search (pulls C `zstd-sys`); off by default
# per the COOLJAPAN Pure Rust default policy. `oxirs` itself does not use Tantivy
# directly, so no direct `tantivy` dependency is required here.
text = ["oxirs-tdb/full-text-search", "oxirs-fuseki/full-text-search"]
geo = []
# DuckDB-backed TSDB chunk inspection (`oxirs tsdb duckdb`). Pulls libduckdb C
# dependencies via the `publish = false` `oxirs-tsdb-adapter-duckdb` quarantine
# crate; off by default per the COOLJAPAN Pure Rust default policy.
tsdb-duckdb = ["dep:oxirs-tsdb-adapter-duckdb", "dep:arrow"]

# oxirs-tsdb is a mandatory (non-optional) Pure-Rust dependency: `oxirs tsdb
# query/insert/stats/export/benchmark` are wired to its real ColumnarStore /
# SeriesIndex APIs (see commands/tsdb.rs), not a placeholder. Only the DuckDB
# chunk-inspection bridge (`tsdb-duckdb` feature) pulls C FFI, via the
# separate `oxirs-tsdb-adapter-duckdb` quarantine crate above.
[dependencies.oxirs-tsdb]
workspace = true

# DuckDB bridge lives in the quarantine adapter crate (publish = false) so the
# libduckdb C FFI stays off oxirs-tsdb's published Pure-Rust surface.
[dependencies.oxirs-tsdb-adapter-duckdb]
workspace = true
optional = true

# NOTE (cargo-upgrade sweep, 2026-07-02): pinned to arrow 58 (NOT workspace 59) — a
# per-crate override. oxirs-tsdb-adapter-duckdb hands back `duckdb::arrow` RecordBatch
# (= the arrow 58.3.0 duckdb 1.10504 bundles), and the tsdb_duckdb tool needs
# STANDALONE arrow with `prettyprint` (pretty_format_batches) that duckdb's re-export
# doesn't enable — so a direct arrow dep is required, and it must be 58 so the tool's
# RecordBatch type is identical to the adapter's (otherwise E0308). Re-eval when duckdb
# bundles arrow 59 (then this can return to `workspace = true`).
[dependencies.arrow]
version = "58"
optional = true
features = ["prettyprint"]

[package.metadata.docs.rs]
# Use minimal features for docs.rs build (avoid features with system dependencies)
features = ["geo"]
# Exclude: text (tantivy build issues), tsdb-duckdb (libduckdb C build)
rustdoc-args = ["--cfg", "docsrs"]

[package.metadata.cargo-machete]
# prettytable-rs is used as `prettytable` (lib name differs from package name),
# which cargo-machete cannot match against the dependency key.
ignored = ["prettytable-rs"]

[[bin]]
name = "oxirs"
path = "src/main.rs"

[[bench]]
name = "cli_performance"
harness = false

[[bench]]
name = "cli_enhancements"
harness = false
